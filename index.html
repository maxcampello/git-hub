<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoCode - Boas Vindas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    h1 span {
      color: #7c3aed;
    }

    p {
      font-size: 1.1rem;
      color: #a1a1aa;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">NoCode</div>
    <h1>Boas <span>Vindas</span></h1>
    <p>Estamos felizes em ter você aqui. Prepare-se para aprender e criar sem limites.</p>
  </div>
</body>
</html>
